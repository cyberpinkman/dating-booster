name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: macos-latest
    env:
      DATING_BOOST_KEY_PROVIDER: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          pip install -e .[test]
      - name: Release doctor
        run: dating-boost release doctor --json
      - name: Test
        run: python -m pytest
      - name: Build Python artifacts
        run: python -m build --outdir dist/python
      - name: Build skill artifact
        run: |
          mkdir -p dist/skill
          tar -czf "dist/skill/dating-booster-codex-${GITHUB_REF_NAME#v}.tar.gz" -C skills dating-booster-codex
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/python
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/python/*
            dist/skill/*
